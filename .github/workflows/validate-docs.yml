name: Validate Javadocs Generation

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - release-*
    tags:
      - v*

  pull_request:
    branches:
    - master
    - release-*

jobs:
  build:
    name: "Validate Javadocs generation"
    runs-on: oracle-vm-4cpu-16gb-arm64
    timeout-minutes: 60
    env:
      JDK_VER: 17
    steps:
    - uses: actions/checkout@v7
    - name: Set up OpenJDK ${{ env.JDK_VER }}
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ env.JDK_VER }}
        cache: 'maven'
    - name: Install jars
      run: ./mvnw install -q -B -DskipTests
    # Validate that aggregate Javadoc generates cleanly (failOnError is set in the
    # pom's reporting config). Run javadoc:aggregate directly rather than site-deploy:
    # the aggregate report re-executes once per reactor module under the site
    # lifecycle (~10x a full-source pass), which is what pushed this job to ~32 min.
    # Invoked directly, the goal runs once over the whole reactor.
    - name: Validate Java docs generation
      run: ./mvnw -q -B -DskipTests javadoc:aggregate
