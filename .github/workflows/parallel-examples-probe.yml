# TEMPORARY probe workflow — validates the parallel-example-validation approach on a
# 3-README pilot (state + invoke/http + pubsub) against a single shared `dapr init`
# runtime. Remove before merging; not intended for master.
name: Parallel Examples Probe

on:
  workflow_dispatch:
  push:
    branches:
      - users/svegiraju/parallel-examples-probe

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      JDK_VER: 17
      DAPR_CLI_VER: 1.18.0
      DAPR_RUNTIME_VER: 1.18.0
      DAPR_INSTALL_URL: https://raw.githubusercontent.com/dapr/cli/v1.18.0/install/install.sh
      PILOT: >-
        src/main/java/io/dapr/examples/state/README.md
        src/main/java/io/dapr/examples/invoke/http/README.md
        src/main/java/io/dapr/examples/pubsub/README.md
    steps:
      - uses: actions/checkout@v7
      - name: Set up OpenJDK ${{ env.JDK_VER }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JDK_VER }}
      - name: Check Docker version
        run: docker version
      - name: Set up Dapr CLI
        run: wget -q ${{ env.DAPR_INSTALL_URL }} -O - | /bin/bash -s ${{ env.DAPR_CLI_VER }}
      - name: Uninstall any existing Dapr
        run: dapr uninstall --all || true
      - name: Initialize Dapr runtime ${{ env.DAPR_RUNTIME_VER }}
        run: dapr init --runtime-version ${{ env.DAPR_RUNTIME_VER }}
      - name: Verify scheduler is listening
        run: sleep 20 && docker logs dapr_scheduler && nc -vz localhost 50006
      - name: Install mechanical-markdown
        run: |
          echo "PATH=$PATH:$HOME/.local/bin" >> $GITHUB_ENV
          pip3 install setuptools wheel
          pip3 install mechanical-markdown
      - name: Build SDK + examples jar
        run: ./mvnw -pl examples -am clean install -B -q -DskipTests
      - name: Static parallel-safety check (pilot only)
        run: bash examples/validate/check-parallel-safe.sh ${{ env.PILOT }}
      - name: Sequential baseline (-j 1)
        run: |
          echo "::group::sequential"
          time bash examples/validate/run-parallel.sh -j 1 ${{ env.PILOT }}
          echo "::endgroup::"
      - name: Parallel run on one shared runtime (-j 3)
        run: |
          echo "::group::parallel"
          time bash examples/validate/run-parallel.sh -j 3 ${{ env.PILOT }}
          echo "::endgroup::"
