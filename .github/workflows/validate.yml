name: Auto Validate Examples

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - release-*
    tags:
      - v*

  pull_request:
    branches:
    - master
    - release-*
jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Keep running if one leg fails.
      matrix:
        java: [ 17 ]
    env:
      GOVER: "1.20"
      GOOS: linux
      GOARCH: amd64
      GOPROXY: https://proxy.golang.org
      JDK_VER: ${{ matrix.java }}
      DAPR_CLI_VER: 1.18.0
      DAPR_RUNTIME_VER: 1.18.0
      DAPR_INSTALL_URL: https://raw.githubusercontent.com/dapr/cli/v1.18.0/install/install.sh
      DAPR_CLI_REF:
      DAPR_REF:
    steps:
      - uses: actions/checkout@v7
      - name: Set up OpenJDK ${{ env.JDK_VER }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JDK_VER }}
      - name: Check Docker version
        run: docker version
      - name: Set up Dapr CLI
        run: wget -q ${{ env.DAPR_INSTALL_URL }} -O - | /bin/bash -s ${{ env.DAPR_CLI_VER }}
      - name: Set up Go ${{ env.GOVER }}
        if: env.DAPR_REF != '' || env.DAPR_CLI_REF != ''
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GOVER }}
      - name: Checkout Dapr CLI repo to override dapr command.
        uses: actions/checkout@v7
        if: env.DAPR_CLI_REF != ''
        with:
          repository: dapr/cli
          ref: ${{ env.DAPR_CLI_REF }}
          path: cli
      - name: Checkout Dapr repo to override daprd.
        uses: actions/checkout@v7
        if: env.DAPR_REF != ''
        with:
          repository: dapr/dapr
          ref: ${{ env.DAPR_REF }}
          path: dapr
      - name: Build and override dapr cli with referenced commit.
        if: env.DAPR_CLI_REF != ''
        run: |
          cd cli
          make
          sudo cp dist/linux_amd64/release/dapr /usr/local/bin/dapr
          cd ..
      - name: Uninstall Dapr runtime ${{ env.DAPR_RUNTIME_VER }}
        run: dapr uninstall --all
      - name: Ensure Dapr runtime uninstalled
        run: |
          while [ "$(docker ps -aq --filter 'name=^/dapr')" ]; do
            echo "Waiting for Dapr containers to be deleted..."
            sleep 5
          done
          echo "All dapr containers are deleted."
      - name: Initialize Dapr runtime ${{ env.DAPR_RUNTIME_VER }}
        run: dapr init --runtime-version ${{ env.DAPR_RUNTIME_VER }}
      - name: Build and override daprd with referenced commit.
        if: env.DAPR_REF != ''
        run: |
          cd dapr
          make
          mkdir -p $HOME/.dapr/bin/
          cp dist/linux_amd64/release/daprd $HOME/.dapr/bin/daprd
          cd ..
      - name: Override placement service.
        if: env.DAPR_REF != ''
        run: |
          docker stop dapr_placement
          cd dapr
          ./dist/linux_amd64/release/placement &
      - name: Install utilities dependencies
        run: |
          echo "PATH=$PATH:$HOME/.local/bin" >> $GITHUB_ENV
          pip3 install setuptools wheel
          pip3 install mechanical-markdown
      - name: Verify scheduler is listening on port.
        run: sleep 30 && docker logs dapr_scheduler && nc -vz localhost 50006
      - name: Install jars
        run: ./mvnw clean install -DskipTests -q
      - name: Validate examples
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 30
          retry_wait_seconds: 10
          command: |
            set -e
            # Example READMEs run concurrently against one shared Dapr runtime via the
            # parallel-safe runner examples/validate/run-parallel.sh.
            bash examples/validate/run-parallel.sh -j 4
            (cd spring-boot-examples && mm.py README.md)
            (cd spring-boot-examples/workflows/patterns && mm.py README.md)
