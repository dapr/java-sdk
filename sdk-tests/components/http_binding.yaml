apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: github-http-binding-404
spec:
  type: bindings.http
  version: v1
  metadata:
  - name: url
    value: https://httpbin.org/status/404
scopes:
  - bindingit-httpoutputbinding-exception
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: github-http-binding-404-success
spec:
  type: bindings.http
  version: v1
  metadata:
    - name: url
      value: https://httpbin.org/status/404
    - name: errorIfNot2XX
      value: "false"
scopes:
  - bindingit-httpoutputbinding-ignore-error